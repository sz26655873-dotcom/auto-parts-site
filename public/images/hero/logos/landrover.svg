<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" width="120" height="60">
  <!-- Ellipse background -->
  <ellipse cx="60" cy="30" rx="58" ry="28" fill="#005A2B"/>
  <!-- White border -->
  <ellipse cx="60" cy="30" rx="58" ry="28" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Inner decorative border -->
  <ellipse cx="60" cy="30" rx="52" ry="22" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
  <!-- LAND text -->
  <text x="60" y="24" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF" letter-spacing="4">LAND</text>
  <!-- ROVER text -->
  <text x="60" y="40" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF" letter-spacing="4">ROVER</text>
</svg>
